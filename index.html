<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" user-scalable=no">
<link rel="manifest" href="manifest.json">

<script>
      // Service worker register karna zaroori hai
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Worker Registered'))
            .catch(err => console.log('Error:', err));
        });
      }
    </script>
<meta charset="UTF-8">
    <title>Chat App - Login & Signup</title>
    <style>
/* Purani fix width ki jagah ye use karein */
.container {
  width: 100%;       /* Poori screen cover karega */
  max-width: 500px;  /* Bade screen par 500px se zyada nahi hoga */
  margin: 0 auto;    /* Center mein rahega */
}
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: gradientBG 15s ease infinite; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .box { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; width: 380px; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        h2 { margin-bottom: 20px; font-weight: 600; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; outline: none; font-size: 14px; color: #333; }
        button { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 10px; background: white; color: #e73c7e; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #23a6d5; color: white; }
        .link { cursor: pointer; display: block; margin-top: 15px; font-size: 13px; text-decoration: underline; }
        #signup-inputs { display: none; } /* Default: Login mode */
    </style>
</head>
<body>

    <div class="box">
        <h2 id="form-title">Login</h2>
        
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        
        <div id="signup-inputs">
            <input type="text" id="username" placeholder="Choose Unique Username (e.g. rahul123)">
            <input type="text" id="nickname" placeholder="Your Full Name">
            <input type="text" id="mobile" placeholder="Mobile Number">
            <p style="font-size: 12px; text-align: left; margin: 5px 0 0 5px;">Date of Birth:</p>
            <input type="date" id="dob">
        </div>

        <button onclick="handleAuth()" id="main-btn">Login</button>
        <span class="link" onclick="toggleForm()" id="toggle-link">New user? Create Account (Signup)</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Yahan apni Firebase Config paste karein
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBFOqarmLLwqm9Xu9hxRiByowYBlOzBCn4",
  authDomain: "project-name-38244.firebaseapp.com",
  projectId: "project-name-38244",
  storageBucket: "project-name-38244.firebasestorage.app",
  messagingSenderId: "1072997114249",
  appId: "1:1072997114249:web:834ee5651d7f3e8944c158",
  measurementId: "G-785KLPXEZD"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLogin = true;

        window.toggleForm = () => {
            isLogin = !isLogin;
            const signupDiv = document.getElementById('signup-inputs');
            const title = document.getElementById('form-title');
            const btn = document.getElementById('main-btn');
            const link = document.getElementById('toggle-link');

            if (isLogin) {
                signupDiv.style.display = 'none';
                title.innerText = "Login";
                btn.innerText = "Login";
                link.innerText = "New user? Create Account (Signup)";
            } else {
                signupDiv.style.display = 'block';
                title.innerText = "Sign Up";
                btn.innerText = "Register Now";
                link.innerText = "Already have an account? Login";
            }
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) { alert("Email aur Password bhariye!"); return; }

            try {
                if (isLogin) {
                    // LOGIN LOGIC
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    // SIGNUP LOGIC
                    const user = document.getElementById('username').value.trim().toLowerCase();
                    const nick = document.getElementById('nickname').value;
                    const mob = document.getElementById('mobile').value;
                    const birth = document.getElementById('dob').value;

                    if (!user || !nick) { alert("Username aur Nickname zaruri hai!"); return; }

                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    
                    // Firestore mein data save karein (Username field ke saath)
                    await setDoc(doc(db, "users", userCred.user.uid), {
                        uid: userCred.user.uid,
                        username: user,
                        nickname: nick,
                        mobile: mob,
                        dob: birth,
                        email: email
                    });
                }
                window.location.href = "chat.html";
            } catch (err) {
                alert("Error: " + err.message);
            }
        };
    </script>
</body>
</html>
