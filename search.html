<!DOCTYPE html>
<html lang="en">
<head>


    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#00d4ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            overflow-x: hidden; /* Side scrolling band karne ke liye */
        }
    </style>



    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Friends</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #764ba2; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .search-row { display: flex; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 10px 0 0 10px; border: none; outline: none; color: #333; }
        .search-btn { padding: 12px 20px; border-radius: 0 10px 10px 0; border: none; background: #23d5ab; color: white; cursor: pointer; font-weight: 600; }
        .profile-box { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; display: none; text-align: left; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .add-btn { background: #28a745; color: white; }
        .block-btn { background: #ff4b2b; color: white; }
        .unblock-btn { background: #ffc107; color: #333; }
        .back-btn { background: white; color: #764ba2; margin-top: 15px; }
        .bio { font-style: italic; color: #ddd; margin: 10px 0; border-left: 3px solid #23d5ab; padding-left: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add Friend</h2>
        <p style="font-size: 12px; margin-bottom: 15px; opacity: 0.8;">Search by exact username</p>
        
        <div class="search-row">
            <input type="text" id="search-input" placeholder="Enter username...">
            <button class="search-btn" id="doSearch">Search</button>
        </div>

        <div id="profile-view" class="profile-box">
            <h3 id="v-nick">Nickname</h3>
            <p id="v-user" style="color: #23d5ab; font-size: 14px;"></p>
            <p id="v-bio" class="bio"></p>
            
            <button id="add-btn" class="btn add-btn">➕ Send Request</button>
            <button id="block-btn" class="btn block-btn">🚫 Block</button>
            <button class="btn back-btn" onclick="hideProfile()">Close</button>
        </div>

        <button class="btn back-btn" onclick="window.location.href='chat.html'">← Back to Dashboard</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config (Apni config yahan dalo)
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBFOqarmLLwqm9Xu9hxRiByowYBlOzBCn4",
  authDomain: "project-name-38244.firebaseapp.com",
  projectId: "project-name-38244",
  storageBucket: "project-name-38244.firebasestorage.app",
  messagingSenderId: "1072997114249",
  appId: "1:1072997114249:web:834ee5651d7f3e8944c158",
  measurementId: "G-785KLPXEZD"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let targetUser = null;
        let myData = null;

        // Dashboard se user check
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                myData = snap.data();
            } else {
                window.location.href = "index.html";
            }
        });

        // 1. SEARCH LOGIC
        document.getElementById('doSearch').addEventListener('click', async () => {
            const val = document.getElementById('search-input').value.trim().toLowerCase();
            if(!val) return;

            const q = query(collection(db, "users"), where("username", "==", val));
            const snap = await getDocs(q);

            if(snap.empty) {
                alert("User nahi mila!");
                return;
            }

            let found = null;
            snap.forEach(d => found = d.data());

            if(found.uid === auth.currentUser.uid) {
                alert("Ye aapka hi profile hai!");
                return;
            }

            // --- BLOCK CHECK ---
            const iBlockedThem = await getDoc(doc(db, "users", auth.currentUser.uid, "blocked", found.uid));
            const theyBlockedMe = await getDoc(doc(db, "users", found.uid, "blocked", auth.currentUser.uid));

            if(theyBlockedMe.exists()) {
                alert("User nahi mila!"); // Privacy: block hone par found nahi dikhate
                return;
            }

            targetUser = found;
            showProfileUI(iBlockedThem.exists());
        });

        // 2. SHOW PROFILE UI
        function showProfileUI(isBlockedByMe) {
            const box = document.getElementById('profile-view');
            box.style.display = 'block';
            
            document.getElementById('v-nick').innerText = targetUser.nickname;
            document.getElementById('v-user').innerText = "@" + targetUser.username;

            const addBtn = document.getElementById('add-btn');
            const blockBtn = document.getElementById('block-btn');

            if(isBlockedByMe) {
                document.getElementById('v-bio').innerText = "Content hidden (User Blocked)";
                addBtn.style.display = 'none';
                blockBtn.innerText = "Unblock User";
                blockBtn.className = "btn unblock-btn";
            } else {
                document.getElementById('v-bio').innerText = targetUser.bio || "No bio available";
                addBtn.style.display = 'block';
                blockBtn.innerText = "Block User";
                blockBtn.className = "btn block-btn";
            }
        }

        window.hideProfile = () => { document.getElementById('profile-view').style.display = 'none'; };

        // 3. BLOCK/UNBLOCK ACTION
        document.getElementById('block-btn').addEventListener('click', async () => {
            const blockRef = doc(db, "users", auth.currentUser.uid, "blocked", targetUser.uid);
            const snap = await getDoc(blockRef);

            if(snap.exists()) {
                await deleteDoc(blockRef);
                alert("Unblocked!");
                showProfileUI(false);
            } else {
                await setDoc(blockRef, { blockedAt: new Date() });
                alert("Blocked!");
                showProfileUI(true);
            }
        });

        // 4. SEND REQUEST
        document.getElementById('add-btn').addEventListener('click', async () => {
            try {
                await addDoc(collection(db, "requests"), {
                    to: targetUser.uid,
                    from: auth.currentUser.uid,
                    fromUser: myData.username,
                    time: new Date()
                });
                alert("Friend Request Sent!");
            } catch (e) { alert("Error: " + e.message); }
        });

    </script>
</body>
</html>
