<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" user-scalable=no">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Dashboard</title>
    <style>
.container {
  width: 100%;       /* Poori screen cover karega */
  max-width: 500px;  /* Bade screen par 500px se zyada nahi hoga */
  margin: 0 auto;    /* Center mein rahega */
}

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #764ba2; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: white; 
            padding: 20px;
        }

        .dashboard { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.2); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { margin-bottom: 5px; font-weight: 600; letter-spacing: 1px; }
        .welcome-msg { font-size: 13px; margin-bottom: 25px; opacity: 0.8; }

        .nav-btn { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            border: none; 
            border-radius: 12px; 
            background: white; 
            color: #764ba2; 
            font-size: 15px;
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-btn:hover { 
            background: #f0f0f0; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Blocked User Button - Dark Theme */
        .block-nav-btn {
            background: #333;
            color: white;
        }
        .block-nav-btn:hover {
            background: #444;
            color: #ff4b2b;
        }

        .logout-btn { 
            background: #ff4b2b; 
            color: white; 
            margin-top: 20px; 
        }
        .logout-btn:hover { background: #e63917; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>Messenger</h2>
        <p class="welcome-msg">User Control Panel</p>
        
        <a href="profile.html" class="nav-btn">👤 My Profile</a>
        <a href="search.html" class="nav-btn">🔍 Add Friend</a>
        <a href="requests.html" class="nav-btn">🔔 Friend Requests</a>
        <a href="friends.html" class="nav-btn">👫 My Friends</a>
        
        <a href="blocked.html" class="nav-btn block-nav-btn">🚫 Blocked Users</a>
        
        <button class="nav-btn logout-btn" id="logoutBtn">🚪 Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Yahan apni Firebase Config paste kar dena
       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBFOqarmLLwqm9Xu9hxRiByowYBlOzBCn4",
  authDomain: "project-name-38244.firebaseapp.com",
  projectId: "project-name-38244",
  storageBucket: "project-name-38244.firebasestorage.app",
  messagingSenderId: "1072997114249",
  appId: "1:1072997114249:web:834ee5651d7f3e8944c158",
  measurementId: "G-785KLPXEZD"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Redirect if not logged in
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
            }
        });

        // Logout function
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
