<!DOCTYPE html>
<html lang="en">
<head>


    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#00d4ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            overflow-x: hidden; /* Side scrolling band karne ke liye */
        }
    </style>



    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Requests</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #764ba2; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .request-item { background: white; color: #333; margin: 10px 0; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .view-btn { background: #764ba2; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        
        /* Modal Style for Show Profile */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #fff; color: #333; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .acc-btn { background: #28a745; color: white; }
        .can-btn { background: #6c757d; color: white; }
        .blk-btn { background: #dc3545; color: white; }
        .chat-btn { background: #23d5ab; color: white; display: none; }
        .back-btn { background: white; color: #764ba2; border: 1px solid #764ba2; margin-top: 15px; width: 100%; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Friend Requests</h2>
        <div id="req-list" style="margin-top: 20px;">
            <p id="no-req">Loading requests...</p>
        </div>
        <button class="back-btn" onclick="window.location.href='chat.html'">← Back</button>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3 id="m-nick">Nickname</h3>
            <p id="m-user" style="color: #764ba2; font-weight: 600;"></p>
            <p id="m-bio" style="font-style: italic; margin: 10px 0; font-size: 14px;"></p>
            
            <div id="action-btns">
                <button class="btn acc-btn" onclick="acceptReq()">✅ Accept Request</button>
                <button class="btn can-btn" onclick="cancelReq()">❌ Cancel Request</button>
                <button class="btn blk-btn" onclick="blockUser()">🚫 Block User</button>
            </div>

            <div id="success-msg" style="display: none;">
                <p style="color: #28a745; font-weight: 600; margin: 10px 0;">🎉 You are now friends!</p>
                <button class="btn chat-btn" id="goChat" style="display: block;">💬 Chat Now</button>
            </div>

            <button class="back-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config Yahan Dalo
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBFOqarmLLwqm9Xu9hxRiByowYBlOzBCn4",
  authDomain: "project-name-38244.firebaseapp.com",
  projectId: "project-name-38244",
  storageBucket: "project-name-38244.firebasestorage.app",
  messagingSenderId: "1072997114249",
  appId: "1:1072997114249:web:834ee5651d7f3e8944c158",
  measurementId: "G-785KLPXEZD"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentReq = null; // Jo request open hai
        let myData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                myData = snap.data();
                loadRequests(user.uid);
            } else { window.location.href = "index.html"; }
        });

        // 1. Load Requests
        async function loadRequests(myId) {
            const q = query(collection(db, "requests"), where("to", "==", myId));
            const snap = await getDocs(q);
            const listDiv = document.getElementById('req-list');
            listDiv.innerHTML = "";

            if (snap.empty) {
                listDiv.innerHTML = "<p>No pending requests.</p>";
                return;
            }

            snap.forEach(d => {
                const r = d.data();
                const item = document.createElement('div');
                item.className = "request-item";
                item.innerHTML = `<span>@${r.fromUser}</span> 
                                 <button class="view-btn" onclick='openModal("${d.id}", "${r.from}")'>Show Profile</button>`;
                listDiv.appendChild(item);
            });
        }

        // 2. Open Modal & Fetch Target User Details
        window.openModal = async (reqId, fromUid) => {
            const userSnap = await getDoc(doc(db, "users", fromUid));
            if(userSnap.exists()){
                const u = userSnap.data();
                currentReq = { reqId, ...u };
                document.getElementById('m-nick').innerText = u.nickname;
                document.getElementById('m-user').innerText = "@" + u.username;
                document.getElementById('m-bio').innerText = u.bio || "No bio available";
                
                document.getElementById('action-btns').style.display = "block";
                document.getElementById('success-msg').style.display = "none";
                document.getElementById('profileModal').style.display = "flex";
            }
        };

        window.closeModal = () => { document.getElementById('profileModal').style.display = "none"; };

        // 3. Accept Request Logic
        window.acceptReq = async () => {
            try {
                // Friends list mein add karo
                await setDoc(doc(db, "friends", auth.currentUser.uid + "_" + currentReq.uid), {
                    users: [auth.currentUser.uid, currentReq.uid],
                    usernames: [myData.username, currentReq.username],
                    time: new Date()
                });

                // Request delete karo
                await deleteDoc(doc(db, "requests", currentReq.reqId));

                document.getElementById('action-btns').style.display = "none";
                document.getElementById('success-msg').style.display = "block";
                
                document.getElementById('goChat').onclick = () => {
                    window.location.href = "friends.html"; // My Chat section
                };
            } catch (e) { alert(err); }
        };

        // 4. Cancel Request Logic
        window.cancelReq = async () => {
            await deleteDoc(doc(db, "requests", currentReq.reqId));
            alert("Request Cancelled");
            closeModal();
            loadRequests(auth.currentUser.uid);
        };

        // 5. Block User Logic
        window.blockUser = async () => {
            await setDoc(doc(db, "users", auth.currentUser.uid, "blocked", currentReq.uid), { blocked: true });
            await deleteDoc(doc(db, "requests", currentReq.reqId));
            alert("User Blocked");
            closeModal();
            loadRequests(auth.currentUser.uid);
        };
    </script>
</body>
</html>
