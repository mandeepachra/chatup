<!DOCTYPE html>
<html lang="en">
<head>


    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#00d4ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
.container {
  width: 100%;       /* Poori screen cover karega */
  max-width: 500px;  /* Bade screen par 500px se zyada nahi hoga */
  margin: 0 auto;    /* Center mein rahega */
}


        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            overflow-x: hidden; /* Side scrolling band karne ke liye */
        }
    </style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocked Users Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #764ba2; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .blocked-item { background: white; color: #333; margin: 10px 0; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .show-btn { background: #764ba2; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
        
        /* Modal Design */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #fff; color: #333; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        .btn { width: 100%; padding: 12px; margin: 6px 0; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .unblock-btn { background: #ffc107; color: #333; }
        .add-btn { background: #28a745; color: white; }
        .block-btn { background: #dc3545; color: white; }
        .close-btn { background: #eee; color: #333; }
        .back-nav { background: white; color: #764ba2; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Blocked Users</h2>
        <div id="blocked-list" style="margin-top: 20px;">
            <p>Loading list...</p>
        </div>
        <button class="back-nav" onclick="window.location.href='chat.html'">← Back</button>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3 id="m-nick">Nickname</h3>
            <p id="m-user" style="color: #764ba2; margin-bottom: 15px;"></p>
            
            <div id="step-unblock">
                <button class="btn unblock-btn" onclick="handleUnblock()">🔓 Unblock User</button>
            </div>

            <div id="step-options" style="display: none;">
                <p style="color: green; font-size: 13px; margin-bottom: 10px;">User Unblocked! What next?</p>
                <button class="btn add-btn" onclick="sendReq()">➕ Add Friend</button>
                <button class="btn block-btn" onclick="handleBlock()">🚫 Block Again</button>
            </div>

            <button class="btn close-btn" onclick="closeModal()">Close Profile</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, deleteDoc, setDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBFOqarmLLwqm9Xu9hxRiByowYBlOzBCn4",
  authDomain: "project-name-38244.firebaseapp.com",
  projectId: "project-name-38244",
  storageBucket: "project-name-38244.firebasestorage.app",
  messagingSenderId: "1072997114249",
  appId: "1:1072997114249:web:834ee5651d7f3e8944c158",
  measurementId: "G-785KLPXEZD"
};        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let selectedUser = null; 
        let myData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) { 
                const snap = await getDoc(doc(db, "users", user.uid));
                myData = snap.data();
                loadList(user.uid); 
            } else { window.location.href = "index.html"; }
        });

        // 1. List load karo
        async function loadList(myId) {
            const listDiv = document.getElementById('blocked-list');
            const snap = await getDocs(collection(db, "users", myId, "blocked"));
            listDiv.innerHTML = "";

            if(snap.empty) {
                listDiv.innerHTML = "<p>Koi blocked user nahi hai.</p>";
                return;
            }

            snap.forEach(async (d) => {
                const uSnap = await getDoc(doc(db, "users", d.id));
                if(uSnap.exists()) {
                    const u = uSnap.data();
                    const item = document.createElement('div');
                    item.className = "blocked-item";
                    item.innerHTML = `<span><b>@${u.username}</b></span> 
                                     <button class="show-btn" onclick='openProfile("${u.uid}", "${u.username}", "${u.nickname}")'>Show Profile</button>`;
                    listDiv.appendChild(item);
                }
            });
        }

        // 2. Profile Modal Open
        window.openProfile = (uid, username, nickname) => {
            selectedUser = { uid, username, nickname };
            document.getElementById('m-nick').innerText = nickname;
            document.getElementById('m-user').innerText = "@" + username;
            
            document.getElementById('step-unblock').style.display = "block";
            document.getElementById('step-options').style.display = "none";
            document.getElementById('profileModal').style.display = "flex";
        };

        window.closeModal = () => { 
            document.getElementById('profileModal').style.display = "none"; 
            loadList(auth.currentUser.uid); // Refresh list
        };

        // 3. Unblock Logic
        window.handleUnblock = async () => {
            await deleteDoc(doc(db, "users", auth.currentUser.uid, "blocked", selectedUser.uid));
            document.getElementById('step-unblock').style.display = "none";
            document.getElementById('step-options').style.display = "block";
        };

        // 4. Add Friend Logic
        window.sendReq = async () => {
            await addDoc(collection(db, "requests"), {
                to: selectedUser.uid,
                from: auth.currentUser.uid,
                fromUser: myData.username,
                time: new Date()
            });
            alert("Friend Request Bhej Di Gayi!");
            closeModal();
        };

        // 5. Block Again Logic
        window.handleBlock = async () => {
            await setDoc(doc(db, "users", auth.currentUser.uid, "blocked", selectedUser.uid), { blocked: true });
            alert("User Wapas Block Kar Diya Gaya!");
            closeModal();
        };

    </script>
</body>
</html>
